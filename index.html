<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reakční doba</title>

<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.webmanifest">

</head>

<body>

<div class="app">

<!-- SCREEN PLAYERS -->

<div id="screen-players" class="screen active">
<div class="card">

<h1>Reakční hra</h1>
<p class="muted">Kolik bude hráčů?</p>

<div class="grid4">
<button class="big" data-players="2">2 hráči</button>
<button class="big" data-players="3">3 hráči</button>
<button class="big" data-players="4">4 hráči</button>
</div>

</div>
</div>

<!-- SCREEN TOPIC -->

<div id="screen-topic" class="screen">

<div class="card">

<h2>Vyber téma</h2>

<div class="stack">

<button id="topic-shapes" class="big">Tvary</button>

<button id="topic-colors" class="big">
Barvy
</button>

<button id="topic-emoji" class="big">
Emoji
</button>

<button id="topic-words" class="big">
Slova
</button>

<button id="topic-images" class="big">
Vlastní obrázky
</button>

</div>

<button id="back-to-players" class="ghost">
Zpět
</button>

</div>

</div>

<!-- SCREEN SCORING -->

<div id="screen-scoring" class="screen">

<div class="card">

<h2>Bodování</h2>

<div class="stack">

<label class="radio">
<input type="radio" name="scoring" value="classic" checked>
<div>
<b>Klasické</b>
<br>
1 bod pro nejrychlejšího
</div>
</label>

<label class="radio">
<input type="radio" name="scoring" value="3210">
<div>
<b>3-2-1-0</b>
<br>
1.–4. místo
</div>
</label>

<label class="radio">
<input type="radio" name="scoring" value="time">
<div>
<b>Podle času</b>
<br>
Vyhrává nejlepší průměr
</div>
</label>

</div>

<div class="row space">
<button id="back-to-topic" class="ghost">Zpět</button>
<button id="go-to-game" class="big primary">Start</button>
</div>

</div>

</div>

<!-- GAME -->

<div id="screen-game" class="screen">

<div class="game">

<button class="corner c-blue">
<div class="corner-name">Hráč 1</div>
<div class="corner-metric">0</div>
</button>

<button class="corner c-green">
<div class="corner-name">Hráč 2</div>
<div class="corner-metric">0</div>
</button>

<button class="corner c-red">
<div class="corner-name">Hráč 3</div>
<div class="corner-metric">0</div>
</button>

<button class="corner c-yellow">
<div class="corner-name">Hráč 4</div>
<div class="corner-metric">0</div>
</button>

<div class="center">

<div class="frame">
<div id="frame-shape"></div>
</div>

</div>

<button id="btn-start" class="start">
Start
</button>

<div id="countdown" class="countdown hidden">
3
</div>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
