<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Reakční doba – Tvary</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app" aria-live="polite">
    <!-- Screen: players -->
    <section class="screen active" id="screen-players">
      <button class="fs-btn" id="btn-fs" title="Fullscreen">⛶</button>
      <div class="card">
        <h1>Reakční doba</h1>
        <p class="muted">Vyberte počet hráčů.</p>
        <div class="grid4">
          <button class="big" data-players="1">1 hráč</button>
          <button class="big" data-players="2">2 hráči</button>
          <button class="big" data-players="3">3 hráči</button>
          <button class="big" data-players="4">4 hráči</button>
        </div>
      </div>
    </section>

    <!-- Screen: topic -->
    <section class="screen" id="screen-topic">
      <button class="fs-btn" id="btn-fs2" title="Fullscreen">⛶</button>
      <div class="card">
        <h2>Téma</h2>
        <p class="muted">První verze: pouze <b>tvary</b> (kruh, čtverec, obdélník, trojúhelník).</p>
        <div class="grid2">
          <button class="big primary" id="topic-shapes">Tvary</button>
          <button class="big" disabled>Barvy (brzy)</button>
          <button class="big" disabled>Emoji (brzy)</button>
          <button class="big" disabled>Slova (brzy)</button>
          <button class="big" disabled>Vlastní (brzy)</button>
        </div>
        <div class="row">
          <button class="ghost" id="back-to-players">← Zpět</button>
        </div>
      </div>
    </section>

    <!-- Screen: scoring -->
    <section class="screen" id="screen-scoring">
      <button class="fs-btn" id="btn-fs3" title="Fullscreen">⛶</button>
      <div class="card">
        <h2>Pravidla</h2>
        <p class="muted">Vyberte bodování.</p>

        <div class="stack">
          <label class="radio">
            <input type="radio" name="scoring" value="classic" checked>
            <span><b>Klasické</b> – první má 1 bod, ostatní 0. (Rohy ukazují body.)</span>
          </label>

          <label class="radio">
            <input type="radio" name="scoring" value="3210">
            <span><b>3–2–1–0</b> – 1. má 3, 2. má 2, 3. má 1, 4. má 0. (Rohy ukazují body.)</span>
          </label>

          <label class="radio">
            <input type="radio" name="scoring" value="time">
            <span><b>Podle času</b> – nejrychlejší má 10 bodů, ostatní dostanou přibližně <code>10 · (t₁ / t)</code>. (Rohy ukazují průměrný čas.)</span>
          </label>
        </div>

        <div class="row space">
          <button class="ghost" id="back-to-topic">← Zpět</button>
          <button class="big primary" id="go-to-game">Začít hru</button>
        </div>
      </div>
    </section>

    <!-- Screen: game -->
    <section class="screen" id="screen-game">
      <div class="game" id="game-root">
        <!-- Corner buttons -->
        <button class="corner c-blue" id="p1" aria-label="Hráč 1">
          <div class="corner-name">Modrý</div>
          <div class="corner-metric" id="metric1">0 b</div>
        </button>

        <button class="corner c-green" id="p2" aria-label="Hráč 2">
          <div class="corner-name">Zelený</div>
          <div class="corner-metric" id="metric2">0 b</div>
        </button>

        <button class="corner c-red" id="p3" aria-label="Hráč 3">
          <div class="corner-name">Červený</div>
          <div class="corner-metric" id="metric3">0 b</div>
        </button>

        <button class="corner c-yellow" id="p4" aria-label="Hráč 4">
          <div class="corner-name">Žlutý</div>
          <div class="corner-metric" id="metric4">0 b</div>
        </button>

        <!-- Center -->
        <div class="center">
          <div class="frame" id="frame" aria-label="Tvar">
            <div id="frame-shape" class="shape hidden" aria-hidden="true"></div>
          </div>

          <button class="start" id="btn-start">Start</button>
          <div class="countdown hidden" id="countdown">3</div>

          <!-- Results modal -->
          <div class="results hidden" id="results" role="dialog" aria-modal="true">
            <div class="results-top">
              <div class="results-title" id="results-title">Výsledky kola</div>
              <div class="results-sub" id="results-sub">Kolo 1/10 • Bodování: Klasické</div>
              <button class="pill-btn" id="btn-reset" title="Zpět na začátek">Reset</button>
            </div>

            <div class="results-list" id="results-list"></div>

            <div class="row space">
              <button class="big primary" id="btn-next">Next →</button>
            </div>
          </div>

        </div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
